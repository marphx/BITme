<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BitMe | Designed by Mario Garcia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#060607;
      --bg2:#0d0c0a;
      --panel:#14110d;
      --line:rgba(255,222,141,.22);
      --text:#fff7e8;
      --muted:#d4c09a;
      --gold:#f0d48b;
      --gold2:#c79b43;
      --shadow:0 12px 40px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%}
    body{
      font-family:Inter,sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(240,212,139,.08), transparent 28%),
        linear-gradient(180deg,#050505 0%,#0a0907 55%,#0d0b09 100%);
      color:var(--text);
    }
    .home{
      min-height:100vh;
      padding:40px 18px 56px;
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(1100px,100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
    }
    .sprite-stage{
      position:relative;
      width:min(560px,92vw);
      display:flex;
      justify-content:center;
      align-items:center;
      padding-top:10px;
      padding-bottom:10px;
    }
    .sprite-glow{
      position:absolute;
      width:min(430px,72vw);
      aspect-ratio:1/1;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,240,191,.22) 0%, rgba(240,212,139,.16) 28%, rgba(199,155,67,.12) 48%, transparent 70%);
      filter:blur(22px);
      transform:translateY(10px);
      pointer-events:none;
    }
    .sprite-frame{
      position:relative;
      background:linear-gradient(180deg,rgba(21,17,13,.92),rgba(13,10,8,.98));
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow), 0 0 0 1px rgba(255,255,255,.02) inset;
    }
    #heroCanvas{
      display:block;
      width:512px;
      height:512px;
      max-width:min(78vw,512px);
      max-height:min(78vw,512px);
      aspect-ratio:1/1;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      background:transparent;
    }
    .copy{
      width:min(860px,100%);
      text-align:center;
      background:linear-gradient(180deg,rgba(14,12,10,.88),rgba(10,9,8,.96));
      border:1px solid rgba(255,222,141,.16);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:30px 22px 28px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--gold);
      background:rgba(240,212,139,.09);
      border:1px solid rgba(240,212,139,.18);
      margin-bottom:18px;
    }
    .eyebrow::before{
      content:"";
      width:8px;height:8px;border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 12px rgba(240,212,139,.6);
    }
    h1{
      font-family:"Press Start 2P",cursive;
      font-size:clamp(24px,4.6vw,46px);
      line-height:1.35;
      color:#fff8ec;
      text-shadow:
        0 2px 0 rgba(0,0,0,.65),
        0 8px 18px rgba(0,0,0,.65),
        0 0 26px rgba(240,212,139,.08);
      margin-bottom:16px;
    }
    h1 span{color:var(--gold)}
    .sub{
      color:var(--muted);
      font-size:clamp(15px,2vw,18px);
      line-height:1.8;
      max-width:680px;
      margin:0 auto 12px;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }
    .credit{
      color:#f8ddb0;
      font-weight:700;
      letter-spacing:.04em;
      margin-top:8px;
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }
    @media (max-width:640px){
      .home{padding-top:24px}
      .sprite-frame{padding:12px;border-radius:18px}
      #heroCanvas{width:384px;height:384px;max-width:86vw;max-height:86vw}
      .copy{padding:24px 16px 22px}
    }
  </style>
</head>

        <p class="credit">Designed by Mario Garcia</p>

      for(let y = 0; y < data.height; y++){
        for(let x = 0; x < data.width; x++){
          const idx = data.indexedPixels[(y * data.width) + x] ?? 0;
          if(idx === 0) continue; // transparent background
          const color = data.paletteRGB[idx] || [255,255,255];
          ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
          ctx.fillRect(offsetX + x * scale, offsetY + y * scale, scale, scale);
        }
      }
    }

    renderPerfectSprite(heroSpriteData);
  </script>
</body>
